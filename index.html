<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Duel - Saksham vs Toshani</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-short {
            animation: bounce-short 1s ease-in-out infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
        body {
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Added data-type="module" to handle ESM imports correctly in Babel standalone -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        // Firebase Imports via modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Global environment variables
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'attendance-duel-v1';

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);

        const DAYS_TOTAL = 30;

        // SVGs
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;
        const IconCloud = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19a5.5 5.5 0 0 0 0-11h-1.5a7 7 0 1 0-11 7h1.5"></path></svg>;
        const IconLoader = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
        const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconShare = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;

        const FUN_PENALTIES = [
            "Buy the other person a coffee ☕",
            "Send a 1-minute voice note singing a song 🎤",
            "Do 20 pushups on video 🤳",
            "Post an embarrassing (but cute) throwback photo 📸",
            "Address the other as 'Your Majesty' for an hour 👑",
            "Treat the other to a snack at the canteen 🍿",
            "Carry the other's bag for one period 🎒",
            "Write a 5-sentence paragraph on why the other is better at attending college 📝"
        ];

        const REWARDS = [
            "Scholar Badge Unlocked! 🎖️",
            "Earned a 'Free Pass' for one homework help 📚",
            "Consistency King/Queen status 👑",
            "Treat yourself to an extra 30 mins of gaming/shows 🎮",
            "Choice of music on the next commute 🎶"
        ];

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [sakshamData, setSakshamData] = useState(Array(DAYS_TOTAL).fill(null));
            const [toshaniData, setToshaniData] = useState(Array(DAYS_TOTAL).fill(null));
            const [activeTab, setActiveTab] = useState('comparison');
            const [isSyncing, setIsSyncing] = useState(false);
            const [copied, setCopied] = useState(false);

            const duelDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'states', 'duelState');

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = onSnapshot(duelDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.saksham) setSakshamData(data.saksham);
                        if (data.toshani) setToshaniData(data.toshani);
                    }
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore read error:", error);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const updateCloud = async (newSaksham, newToshani) => {
                if (!user) return;
                setIsSyncing(true);
                try {
                    await setDoc(duelDocRef, {
                        saksham: newSaksham,
                        toshani: newToshani,
                        lastUpdated: new Date().toISOString(),
                        updatedBy: user.uid
                    });
                } catch (err) {
                    console.error("Sync error:", err);
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleShare = () => {
                const url = window.location.href;
                const textArea = document.createElement("textarea");
                textArea.value = url;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            const calculateScore = (data) => {
                return data.reduce((acc, status) => {
                    if (status === true) return acc + 1;
                    if (status === false) return acc - 1;
                    return acc;
                }, 0);
            };

            const getProgress = (data) => {
                const attended = data.filter(s => s === true).length;
                return Math.round((attended / DAYS_TOTAL) * 100);
            };

            const toggleDay = (player, index, status) => {
                let newSaksham = [...sakshamData];
                let newToshani = [...toshaniData];

                if (player === 'saksham') {
                    newSaksham[index] = newSaksham[index] === status ? null : status;
                    setSakshamData(newSaksham);
                } else {
                    newToshani[index] = newToshani[index] === status ? null : status;
                    setToshaniData(newToshani);
                }
                updateCloud(newSaksham, newToshani);
            };

            const resetAll = async () => {
                if (window.confirm("Reset BOTH Saksham and Toshani?")) {
                    const empty = Array(DAYS_TOTAL).fill(null);
                    setSakshamData(empty);
                    setToshaniData(empty);
                    await updateCloud(empty, empty);
                }
            };

            const PlayerCard = ({ name, data, color, iconColor }) => {
                const score = calculateScore(data);
                const progress = getProgress(data);
                const lastAction = data.filter(x => x !== null).length > 0 ? data.findLastIndex(x => x !== null) : -1;
                const isPenalty = lastAction !== -1 && data[lastAction] === false;
                const isReward = lastAction !== -1 && data[lastAction] === true;

                return (
                    <div className={`p-6 rounded-3xl shadow-xl ${color} border-2 border-white/20 backdrop-blur-sm transition-all`}>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-3xl font-bold text-gray-800">{name}</h2>
                            <div className="text-right">
                                <p className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Total Score</p>
                                <p className={`text-4xl font-black ${score >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                    {score > 0 ? `+${score}` : score}
                                </p>
                            </div>
                        </div>

                        <div className="mb-6">
                            <div className="flex justify-between text-xs mb-1 font-bold text-gray-500">
                                <span>Progress</span>
                                <span>{progress}%</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                <div className={`h-full transition-all duration-700 ${iconColor}`} style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>

                        <div className="mb-8 min-h-[90px] flex items-center">
                            {isPenalty && (
                                <div className="w-full p-4 bg-red-100 border-l-4 border-red-500 rounded-lg animate-bounce-short">
                                    <p className="text-red-700 font-bold text-xs uppercase mb-1 text-[10px]">Penalty Unlocked!</p>
                                    <p className="text-red-600 italic text-sm">"{FUN_PENALTIES[lastAction % FUN_PENALTIES.length]}"</p>
                                </div>
                            )}
                            {isReward && (
                                <div className="w-full p-4 bg-green-100 border-l-4 border-green-500 rounded-lg">
                                    <p className="text-green-700 font-bold text-xs uppercase mb-1 text-[10px]">Reward Unlocked!</p>
                                    <p className="text-green-600 italic text-sm">{REWARDS[lastAction % REWARDS.length]}</p>
                                </div>
                            )}
                            {!isPenalty && !isReward && (
                                <div className="w-full p-4 bg-gray-100 border-dashed border-2 border-gray-300 rounded-lg text-center text-gray-400 text-xs">
                                    Attendance update reveals tasks
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-5 gap-2">
                            {data.map((status, i) => (
                                <div key={i} className="flex flex-col gap-1">
                                    <div className="text-[8px] text-center text-gray-400 font-bold">D{i + 1}</div>
                                    <button
                                        onClick={() => toggleDay(name.toLowerCase(), i, true)}
                                        className={`p-2 rounded-lg flex justify-center transition-transform active:scale-90 ${status === true ? 'bg-green-500 text-white shadow-md shadow-green-200' : 'bg-white text-gray-300'}`}
                                    >
                                        <IconCheck />
                                    </button>
                                    <button
                                        onClick={() => toggleDay(name.toLowerCase(), i, false)}
                                        className={`p-2 rounded-lg flex justify-center transition-transform active:scale-90 ${status === false ? 'bg-red-500 text-white shadow-md shadow-red-200' : 'bg-white text-gray-300'}`}
                                    >
                                        <IconX />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <IconLoader className="animate-spin-custom text-indigo-600 mx-auto mb-4 w-10 h-10" />
                            <p className="text-gray-500 font-bold">Syncing Duel State...</p>
                        </div>
                    </div>
                );
            }

            const sakshamScore = calculateScore(sakshamData);
            const toshaniScore = calculateScore(toshaniData);
            const leader = sakshamScore > toshaniScore ? "Saksham" : toshaniScore > sakshamScore ? "Toshani" : "Tie";

            return (
                <div className="min-h-screen p-4 font-sans text-gray-900 pb-12">
                    <div className="max-w-5xl mx-auto">
                        <header className="text-center mb-8 relative">
                            <div className="flex justify-center items-center gap-2 mb-2">
                                {isSyncing ? <IconLoader className="animate-spin-custom text-indigo-400" /> : <IconCloud className="text-green-400" />}
                                <span className="text-[10px] uppercase font-bold text-gray-400 tracking-wider">
                                    {isSyncing ? 'Updating Cloud...' : 'Cloud Connection Live'}
                                </span>
                            </div>
                            <h1 className="text-3xl md:text-5xl font-black mb-1">Attendance Duel</h1>
                            <p className="text-gray-400 text-sm">Saksham vs Toshani: 30 Day Battle</p>
                            
                            <div className="mt-6 flex flex-wrap justify-center gap-3">
                                <div className="bg-white p-3 px-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                                    <IconTrophy />
                                    <div className="text-left">
                                        <p className="text-[10px] text-gray-400 uppercase font-bold">Leading</p>
                                        <p className="text-lg font-bold">{leader}</p>
                                    </div>
                                </div>

                                <button 
                                    onClick={handleShare}
                                    className={`flex items-center gap-2 p-3 px-6 rounded-2xl border font-bold text-sm transition-all active:scale-95 ${copied ? 'bg-green-500 border-green-500 text-white' : 'bg-indigo-600 border-indigo-600 text-white shadow-lg shadow-indigo-200'}`}
                                >
                                    <IconShare />
                                    {copied ? 'Link Copied!' : 'Share Link'}
                                </button>

                                <button onClick={resetAll} className="p-3 bg-white rounded-2xl border border-gray-100 text-gray-300 hover:text-red-500 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                                </button>
                            </div>
                        </header>

                        <div className="flex md:hidden bg-gray-200 p-1 rounded-xl mb-6 shadow-inner">
                            {['saksham', 'comparison', 'toshani'].map(tab => (
                                <button key={tab} className={`flex-1 py-2 rounded-lg text-xs font-bold capitalize transition-all ${activeTab === tab ? 'bg-white shadow text-indigo-600' : 'text-gray-500'}`} onClick={() => setActiveTab(tab)}>
                                    {tab === 'comparison' ? 'VS Mode' : tab}
                                </button>
                            ))}
                        </div>

                        <div className="grid md:grid-cols-2 gap-6 lg:gap-10">
                            {(activeTab === 'saksham' || activeTab === 'comparison') && (
                                <PlayerCard name="Saksham" data={sakshamData} color="bg-blue-50/80" iconColor="bg-blue-600" />
                            )}
                            {(activeTab === 'toshani' || activeTab === 'comparison') && (
                                <PlayerCard name="Toshani" data={toshaniData} color="bg-pink-50/80" iconColor="bg-pink-600" />
                            )}
                        </div>

                        <div className="mt-12 bg-white p-6 md:p-8 rounded-3xl border border-gray-100 shadow-sm">
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-600 uppercase tracking-wide">
                                <IconZap /> The Agreement
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs font-medium text-gray-500">
                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <p className="text-indigo-600 font-bold mb-1">Score +1 / -1</p>
                                    Consistency is key. Attending adds weight; skipping hurts the score.
                                </div>
                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <p className="text-indigo-600 font-bold mb-1">The Penalties</p>
                                    Missed a class? Check your task. No excuses—the duel is live!
                                </div>
                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <p className="text-indigo-600 font-bold mb-1">Invite Friend</p>
                                    Send the link. No accounts needed. Just open and start clicking.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
