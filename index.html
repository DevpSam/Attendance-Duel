<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toshani's Attendance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }
        .custom-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-short {
            animation: bounce-short 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DAYS_TOTAL = 30;

        const FUN_PENALTIES = [
            "Buy a coffee for a friend ☕",
            "Send a 1-minute voice note singing 🎤",
            "Do 15 mins of focused study extra 📚",
            "Post a cute sky picture on story ☁️",
            "Treat yourself to a small snack later 🍿",
            "Write down 3 things you're grateful for 📝",
            "Drink 2 liters of water today 💧",
            "Organize your desk for 10 minutes 🧹"
        ];

        const REWARDS = [
            "Scholar Badge Unlocked! 🎖️",
            "Early break choice! ☕",
            "Extra episode of your show tonight 📺",
            "Treat yourself to your fav drink 🥤",
            "Consistency Queen status 👑"
        ];

        // SVGs
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

        const App = () => {
            const [attendance, setAttendance] = useState(() => {
                const saved = localStorage.getItem('toshani_attendance');
                return saved ? JSON.parse(saved) : Array(DAYS_TOTAL).fill(null);
            });

            useEffect(() => {
                localStorage.setItem('toshani_attendance', JSON.stringify(attendance));
            }, [attendance]);a

            const calculateScore = () => {
                return attendance.reduce((acc, status) => {
                    if (status === true) return acc + 1;
                    if (status === false) return acc - 1;
                    return acc;
                }, 0);
            };

            const toggleDay = (index, status) => {
                const newData = [...attendance];
                newData[index] = newData[index] === status ? null : status;
                setAttendance(newData);
            };

            const resetAll = () => {
                if (confirm("Reset your 30-day progress?")) {
                    setAttendance(Array(DAYS_TOTAL).fill(null));
                }
            };

            const lastActionIdx = attendance.filter(x => x !== null).length > 0 ? attendance.findLastIndex(x => x !== null) : -1;
            const isPenalty = lastActionIdx !== -1 && attendance[lastActionIdx] === false;
            const isReward = lastActionIdx !== -1 && attendance[lastActionIdx] === true;
            const score = calculateScore();
            const progress = Math.round((attendance.filter(s => s === true).length / DAYS_TOTAL) * 100);

            return (
                <div className="max-w-md mx-auto p-6 md:py-12">
                    <header className="mb-8 text-center">
                        <h1 className="text-4xl font-bold text-[#6b4e3d] mb-1">Toshani's Tracker</h1>
                        <p className="text-[#a68a7b] text-sm font-medium">30 Days of Consistency</p>
                    </header>

                    {/* Stats Card */}
                    <section className="glass-card p-6 custom-shadow mb-6 flex justify-between items-center">
                        <div>
                            <p className="text-[10px] uppercase font-bold text-[#a68a7b] tracking-widest">Consistency Score</p>
                            <p className={`text-4xl font-black ${score >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                                {score > 0 ? `+${score}` : score}
                            </p>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] uppercase font-bold text-[#a68a7b] tracking-widest">Goal Progress</p>
                            <p className="text-2xl font-bold text-[#6b4e3d]">{progress}%</p>
                        </div>
                    </section>

                    {/* Task Box */}
                    <section className="mb-6 min-h-[100px] flex items-center">
                        {isPenalty && (
                            <div className="w-full p-5 bg-red-100/50 border-l-4 border-red-400 rounded-2xl animate-bounce-short">
                                <p className="text-red-700 font-bold text-xs uppercase mb-1">Today's Tiny Penalty</p>
                                <p className="text-red-600 italic text-sm">"{FUN_PENALTIES[lastActionIdx % FUN_PENALTIES.length]}"</p>
                            </div>
                        )}
                        {isReward && (
                            <div className="w-full p-5 bg-green-100/50 border-l-4 border-green-400 rounded-2xl">
                                <p className="text-green-700 font-bold text-xs uppercase mb-1">Consistency Reward</p>
                                <p className="text-green-600 italic text-sm">{REWARDS[lastActionIdx % REWARDS.length]}</p>
                            </div>
                        )}
                        {!isPenalty && !isReward && (
                            <div className="w-full p-5 border-dashed border-2 border-[#d4a373]/30 rounded-2xl text-center text-[#a68a7b] text-sm">
                                Update today's status to see your daily task!
                            </div>
                        )}
                    </section>

                    {/* Attendance Grid */}
                    <section className="glass-card p-6 custom-shadow mb-8">
                        <div className="grid grid-cols-5 gap-3">
                            {attendance.map((status, i) => (
                                <div key={i} className="flex flex-col gap-1">
                                    <span className="text-[9px] text-center font-bold text-[#a68a7b]">D{i+1}</span>
                                    <button 
                                        onClick={() => toggleDay(i, true)}
                                        className={`p-2 rounded-xl flex justify-center transition-all ${status === true ? 'bg-green-500 text-white shadow-lg' : 'bg-white/50 text-gray-300 hover:bg-green-50'}`}
                                    >
                                        <IconCheck />
                                    </button>
                                    <button 
                                        onClick={() => toggleDay(i, false)}
                                        className={`p-2 rounded-xl flex justify-center transition-all ${status === false ? 'bg-red-500 text-white shadow-lg' : 'bg-white/50 text-gray-300 hover:bg-red-50'}`}
                                    >
                                        <IconX />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="text-center space-y-4">
                        <div className="text-[10px] text-[#a68a7b] uppercase font-bold tracking-widest leading-relaxed">
                            +1 for Attending • -1 for Missing<br/>
                            Stay consistent, Toshani!
                        </div>
                        <button 
                            onClick={resetAll}
                            className="text-[10px] text-gray-400 hover:text-red-400 font-bold uppercase underline underline-offset-4"
                        >
                            Reset My 30 Days
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
